<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#13111c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Canvas" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <title>Agent Canvas</title>
  </head>
  <body data-view="chat">
    <header>
      <span class="app-title">Agent Canvas</span>
      <span class="offline" id="offline">offline</span>
      <button id="enable">Enable alerts</button>
    </header>

    <!-- CHAT: the orchestrator, the home view -->
    <main id="chat-view">
      <div id="chat-log"></div>
      <div id="chat-confirm"></div>
      <div id="chat-bar">
        <span class="chat-conn" id="chat-conn" style="display: none"></span>
        <input id="chat-input" type="text" placeholder="Talk to the orchestrator…" autocomplete="off" />
        <button id="chat-mic" class="mic" aria-label="Hold to talk">🎙</button>
        <button id="chat-mode" class="chat-mode mode-manual">manual</button>
        <button id="chat-send" class="chat-send" aria-label="Send">↑</button>
      </div>
    </main>

    <!-- FLEET: supervision, the secondary view -->
    <main id="supervise-view">
      <div id="canvases"></div>
      <h2>ACTIVITY</h2>
      <div id="feed" class="empty">…</div>
    </main>

    <nav id="bottom-nav">
      <button data-view="chat" class="on">Chat</button>
      <button data-view="supervise">Fleet<span class="badge" id="nav-badge"></span></button>
    </nav>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
